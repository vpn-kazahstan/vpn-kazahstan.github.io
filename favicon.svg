<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4E8"/>
      <stop offset="55%" stop-color="#00AFCA"/>
      <stop offset="100%" stop-color="#007FA8"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#FFE55C"/>
      <stop offset="60%" stop-color="#FEC807"/>
      <stop offset="100%" stop-color="#E0A900"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEC807"/>
      <stop offset="100%" stop-color="#E0A900"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="32" height="32" rx="8" fill="url(#sky)"/>
  <circle cx="16" cy="12" r="14" fill="url(#glow)"/>

  <!-- Sun with 16 rays (stylized from KZ flag) -->
  <g transform="translate(16,14)">
    <g stroke="#FEC807" stroke-width="0.9" stroke-linecap="round" opacity="0.95">
      <line x1="0" y1="-9" x2="0" y2="-6.5"/>
      <line x1="0" y1="9" x2="0" y2="6.5"/>
      <line x1="-9" y1="0" x2="-6.5" y2="0"/>
      <line x1="9" y1="0" x2="6.5" y2="0"/>
      <line x1="-6.4" y1="-6.4" x2="-4.6" y2="-4.6"/>
      <line x1="6.4" y1="-6.4" x2="4.6" y2="-4.6"/>
      <line x1="-6.4" y1="6.4" x2="-4.6" y2="4.6"/>
      <line x1="6.4" y1="6.4" x2="4.6" y2="4.6"/>
    </g>
    <circle cx="0" cy="0" r="5" fill="url(#sunGrad)"/>
  </g>

  <!-- VPN shield with checkmark, bottom-right -->
  <g transform="translate(22.5,23.5)">
    <path d="M -4.2 -4.4 L 4.2 -4.4 L 4.2 0.2 Q 4.2 3.6 0 5.2 Q -4.2 3.6 -4.2 0.2 Z"
          fill="url(#shieldGrad)" stroke="#0D2A4A" stroke-width="0.4"/>
    <path d="M -1.8 0.2 L -0.3 1.7 L 2.1 -1.3"
          stroke="#0D2A4A" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Steppe ornament dot, bottom-left -->
  <g transform="translate(6,24)" opacity="0.85">
    <circle cx="0" cy="0" r="2.4" fill="#FEC807"/>
    <circle cx="0" cy="0" r="1.2" fill="#0D2A4A"/>
  </g>
</svg>
